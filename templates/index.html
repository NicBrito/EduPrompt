<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPrompt — Plataforma Educativa com IA</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
            --error: #dc2626;
            --accent: #8b5cf6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 24px 0;
            margin-bottom: 24px;
        }

        header h1 { font-size: 1.8rem; }
        header p { opacity: 0.85; font-size: 0.95rem; margin-top: 4px; }

        .info-bar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .info-bar span { font-weight: 600; color: var(--text); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-accent:hover { background: #7c3aed; }
        .btn-accent:disabled { background: #94a3b8; cursor: not-allowed; }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading.active { display: block; }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .results { display: none; }
        .results.active { display: block; }

        .result-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .result-header {
            background: var(--bg);
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-header:hover { background: #f1f5f9; }

        .result-body {
            padding: 16px;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.7;
            max-height: 500px;
            overflow-y: auto;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--error);
            padding: 12px 16px;
            border-radius: 6px;
            display: none;
        }

        .error-msg.active { display: block; }

        .student-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 8px 12px;
            background: var(--bg);
            border-radius: 4px;
            margin-top: 8px;
            display: none;
        }

        .student-info.active { display: block; }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📚 EduPrompt</h1>
            <p>Plataforma Educativa com IA — Geração de Conteúdo Personalizado</p>
        </div>
    </header>

    <div class="container">
        <div class="info-bar">
            <div>Provedor: <span>{{ provider }}</span></div>
            <div>Modelo: <span>{{ model }}</span></div>
        </div>

        <div class="card">
            <h2>⚙️ Configuração</h2>

            <div class="form-group">
                <label for="student">Aluno</label>
                <select id="student" onchange="showStudentInfo()">
                    <option value="">Selecione um aluno...</option>
                    {% for student in students %}
                    <option
                        value="{{ student.id }}"
                        data-age="{{ student.age }}"
                        data-level="{{ student.knowledge_level }}"
                        data-style="{{ student.learning_style }}"
                        data-interests="{{ student.interests | join(', ') }}">
                        {{ student.name }} ({{ student.age }} anos, {{ student.knowledge_level }})
                    </option>
                    {% endfor %}
                </select>
                <div class="student-info" id="studentInfo"></div>
            </div>

            <div class="form-group">
                <label for="topic">Tópico</label>
                <input type="text" id="topic" placeholder="Ex: Fotossíntese, Revolução Francesa, Frações...">
            </div>

            <div class="form-group">
                <label for="contentType">Tipo de Conteúdo</label>
                <select id="contentType">
                    {% for key, label in content_types.items() %}
                    <option value="{{ key }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="version">Versão do Prompt</label>
                <select id="version">
                    {% for v in versions %}
                    <option value="{{ v.version }}" {% if v.version == 'v2' %}selected{% endif %}>
                        {{ v.version }} — {{ v.description }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="btn-row">
                <button class="btn-primary" onclick="generateContent()" id="btnGenerate">
                    Gerar Conteúdo
                </button>
                <button class="btn-accent" onclick="generateAll()" id="btnGenerateAll">
                    Gerar Todos (4 tipos)
                </button>
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px;">Gerando conteúdo personalizado...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <footer>
        EduPrompt — Desafio Técnico de Estágio em IA e Engenharia de Prompt
    </footer>

    <script>
        function showStudentInfo() {
            const select = document.getElementById('student');
            const info = document.getElementById('studentInfo');
            const option = select.options[select.selectedIndex];

            if (!option.value) {
                info.classList.remove('active');
                return;
            }

            info.innerHTML = `
                <strong>Idade:</strong> ${option.dataset.age} anos |
                <strong>Nível:</strong> ${option.dataset.level} |
                <strong>Estilo:</strong> ${option.dataset.style} |
                <strong>Interesses:</strong> ${option.dataset.interests}
            `;
            info.classList.add('active');
        }

        function setLoading(isLoading) {
            document.getElementById('loading').classList.toggle('active', isLoading);
            document.getElementById('btnGenerate').disabled = isLoading;
            document.getElementById('btnGenerateAll').disabled = isLoading;
            if (isLoading) {
                document.getElementById('errorMsg').classList.remove('active');
                document.getElementById('results').classList.remove('active');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('active');
        }

        function renderResult(label, content) {
            return `
                <div class="result-section">
                    <div class="result-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                        <span>${label}</span>
                        <span>▼</span>
                    </div>
                    <div class="result-body">${escapeHtml(content)}</div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function generateContent() {
            const student_id = document.getElementById('student').value;
            const topic = document.getElementById('topic').value.trim();
            const content_type = document.getElementById('contentType').value;
            const prompt_version = document.getElementById('version').value;

            if (!student_id || !topic) {
                showError('Selecione um aluno e informe um tópico.');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id, topic, content_type, prompt_version })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Erro desconhecido.');
                    return;
                }

                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = renderResult(data.content_type, data.content);
                resultsDiv.classList.add('active');

            } catch (e) {
                showError('Erro de conexão com o servidor.');
            } finally {
                setLoading(false);
            }
        }

        async function generateAll() {
            const student_id = document.getElementById('student').value;
            const topic = document.getElementById('topic').value.trim();
            const prompt_version = document.getElementById('version').value;

            if (!student_id || !topic) {
                showError('Selecione um aluno e informe um tópico.');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch('/api/generate-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id, topic, prompt_version })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Erro desconhecido.');
                    return;
                }

                const resultsDiv = document.getElementById('results');
                let html = '';
                for (const [key, value] of Object.entries(data.results)) {
                    html += renderResult(value.label, value.content);
                }
                resultsDiv.innerHTML = html;
                resultsDiv.classList.add('active');

            } catch (e) {
                showError('Erro de conexão com o servidor.');
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
